# SPDX-License-Identifier: Apache-2.0
name: makeitmd

services:
  bot:
    build:
      context: .
      args:
        VERSION: ${BUILD_VERSION:-dev}
        COMMIT: ${BUILD_COMMIT:-none}
        DATE: ${BUILD_DATE:-unknown}
    container_name: makeitmd-bot
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
    environment:
      MIGRATIONS_DIR: /app/migrations
      HTTP_ADDR: :8080
    networks: [core_net]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  core_net:
    external: true
    name: core_net
